# PSYCHO startup settings. Keyboard shortcuts can still adjust these while playing.
mouse_response = 60.0
hide_cursor = true

# Maximum track speed in percent. -1 keeps the current unlimited behavior.
speed_limit = -1 # or 52–327

music_volume = 0.65
visual_fx = true
visual_strength = 0.65

# Experimental headphone effect.
audio_fx = true
audio_fx_strength = 0.5
